<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e1a;
      color: #e8e0d0;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #c89b3c;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 13px;
      color: #6b7a99;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }
    .bar-track {
      width: 220px;
      height: 3px;
      background: #1a2035;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .bar-fill {
      height: 100%;
      background: #c89b3c;
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s ease;
      animation: indeterminate 1.6s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0%   { width: 0%;   margin-left: 0%; }
      50%  { width: 60%;  margin-left: 20%; }
      100% { width: 0%;   margin-left: 100%; }
    }
    .status {
      font-size: 12px;
      color: #4a5568;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="logo">COACH CARTER</div>
  <div class="sub">League of Legends AI Coach</div>
  <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
  <div class="status" id="status">Initialisation...</div>
  <script>
    const { ipcRenderer } = require('electron')
    ipcRenderer.on('splash-status', (_, msg) => {
      document.getElementById('status').textContent = msg
    })
  </script>
</body>
</html>
